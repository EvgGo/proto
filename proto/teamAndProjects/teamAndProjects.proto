syntax = "proto3";

package workspace.v1;

option go_package = "evggo.workspace.v1;workspacev1";

import "google/protobuf/empty.proto";


message Date {
  int32 year = 1;   // e.g. 2026
  int32 month = 2;  // 1..12
  int32 day = 3;    // 1..31
}

enum ProjectInvitationStatus {
  PROJECT_INVITATION_STATUS_UNSPECIFIED = 0;
  PROJECT_INVITATION_STATUS_PENDING = 1;
  PROJECT_INVITATION_STATUS_ACCEPTED = 2;
  PROJECT_INVITATION_STATUS_REJECTED = 3;
  PROJECT_INVITATION_STATUS_REVOKED = 4; // менеджер проекта отозвал приглашение
}

enum ProjectStatus {
  PROJECT_STATUS_UNSPECIFIED = 0;
  PROJECT_STATUS_NOT_STARTED = 1;
  PROJECT_STATUS_IN_PROGRESS = 2;
  PROJECT_STATUS_DONE = 3;
  PROJECT_STATUS_ON_HOLD = 4;
}

enum JoinRequestStatus {
  JOIN_REQUEST_STATUS_UNSPECIFIED = 0;
  JOIN_REQUEST_STATUS_PENDING = 1;
  JOIN_REQUEST_STATUS_APPROVED = 2;
  JOIN_REQUEST_STATUS_REJECTED = 3;
  JOIN_REQUEST_STATUS_CANCELLED = 4;
}

enum ProjectSkillMatchMode {
  PROJECT_SKILL_MATCH_MODE_UNSPECIFIED = 0;
  PROJECT_SKILL_MATCH_MODE_ANY = 1; // проект подходит, если есть хотя бы один skill
  PROJECT_SKILL_MATCH_MODE_ALL = 2; // проект подходит, если есть все skill_ids
}

enum ProjectPublicSortBy {
  PROJECT_PUBLIC_SORT_BY_UNSPECIFIED = 0;
  PROJECT_PUBLIC_SORT_BY_CREATED_AT = 1;
  PROJECT_PUBLIC_SORT_BY_STARTED_AT = 2;
  PROJECT_PUBLIC_SORT_BY_PROFILE_SKILL_MATCH = 3;
}

enum SortOrder {
  SORT_ORDER_UNSPECIFIED = 0;
  SORT_ORDER_ASC = 1;
  SORT_ORDER_DESC = 2;
}

// Для partial update skills у проекта
message SkillIdsSelection {
  repeated string ids = 1; // полный итоговый набор skill_id, max 60
}

// Права участника проекта
// manager_rights — суперправо: может выдавать/отнимать любые права
message ProjectRights {
  bool manager_rights = 1;
  bool manager_member = 2;
  bool manager_projects = 3;
  bool manager_tasks = 4;
}

message Team {
  string id = 1;
  string name = 2;
  string description = 3;
  bool is_invitable = 4;
  bool is_joinable = 5;

  string founder_id = 6;         // UUID
  string lead_id = 7;            // UUID, может быть пустым

  Date created_at = 8;
  Date updated_at = 9;

  TeamRights my_rights = 10;
  TeamCapabilities capabilities = 11;
}

message TeamMember {
  string team_id = 1;            // UUID
  string user_id = 2;            // UUID
  string duties = 3;

  Date joined_at = 4;
  TeamRights rights = 5;
}

message Project {
  string id = 1;                 // UUID
  string team_id = 2;            // UUID
  string creator_id = 3;         // UUID

  string name = 4;
  string description = 5;

  ProjectStatus status = 6;
  bool is_open = 7;

  Date started_at = 8;
  optional Date finished_at = 9;          // может быть нулевой

  Date created_at = 10;
  Date updated_at = 11;

  repeated string skill_ids = 12; // требуемые проекту skills, max 60
  repeated ProjectSkill skills = 13;

  ProjectRights my_rights = 14;

  // Требования проекта по тестированию
  // Пользователь может вступить в проект только если закрыл эти требования
  repeated ProjectAssessmentRequirement assessment_requirements = 15;
}


message ProjectPublic {
  string id = 1;                 // UUID
  string team_id = 2;            // UUID

  string name = 3;
  string description = 4;
  ProjectStatus status = 5;
  bool is_open = 6;

  Date started_at = 7;
  optional Date finished_at = 8;          // nullable на уровне БД

  Date created_at = 9;

  repeated string skill_ids = 10; // skills проекта для публичного списка
  repeated ProjectSkill skills = 11;
  optional int32 profile_skill_match_percent = 12;

  // Публичные требования проекта по тестированию
  // Нужны, чтобы кандидат сразу видел, какие тесты и уровни требуются
  repeated ProjectAssessmentRequirement assessment_requirements = 13;
}

message ProjectMember {
  string project_id = 1;         // UUID
  string user_id = 2;            // UUID
  ProjectRights rights = 3;
}

// JoinRequest к проекту пользователь просится в проект
message ProjectJoinRequest {
  string id = 1;                 // UUID
  string project_id = 2;         // UUID
  string requester_id = 3;       // UUID

  string message = 4;
  JoinRequestStatus status = 5;

  optional string decided_by = 6;         // UUID
  optional Date decided_at = 7;

  Date created_at = 8;
  optional string decision_reason = 9;
}

// Invitation в проект: проект приглашает пользователя вступить в проект
message ProjectInvitation {
  string id = 1;                 // UUID
  string project_id = 2;         // UUID
  string invited_user_id = 3;    // UUID
  string invited_by = 4;         // UUID - кто отправил приглашение

  string message = 5;
  ProjectInvitationStatus status = 6;

  optional string decided_by = 7;         // UUID
  optional Date decided_at = 8;

  Date created_at = 9;
  optional string decision_reason = 10;
}


service Teams {
  // Создание команды. Обычно создатель становится founder_id
  rpc CreateTeam(CreateTeamRequest) returns (Team);

  rpc GetTeam(GetTeamRequest) returns (Team);

  // Частичный апдейт команды
  rpc UpdateTeam(UpdateTeamRequest) returns (Team);

  rpc DeleteTeam(DeleteTeamRequest) returns (google.protobuf.Empty);

  // Список команд
  rpc ListTeams(ListTeamsRequest) returns (ListTeamsResponse);

  // Участники команды
  rpc ListTeamMembers(ListTeamMembersRequest) returns (ListTeamMembersResponse);

  // Обновление duties участника команды (частично)
  rpc UpdateTeamMember(UpdateTeamMemberRequest) returns (TeamMember);

  rpc RemoveTeamMember(RemoveTeamMemberRequest) returns (google.protobuf.Empty);

  rpc ListTeamMemberDetails(ListTeamMemberDetailsRequest)
      returns (ListTeamMemberDetailsResponse);

  rpc UpdateTeamMemberDuties(UpdateTeamMemberDutiesRequest) returns (TeamMember);

  rpc UpdateTeamMemberRights(UpdateTeamMemberRightsRequest) returns (TeamMember);

  rpc AssignTeamMemberToProject(AssignTeamMemberToProjectRequest)
      returns (ProjectMember);

  rpc ListTeamProjectsForAssignment(ListTeamProjectsForAssignmentRequest)
      returns (ListTeamProjectsForAssignmentResponse);
}

message CreateTeamRequest {
  string name = 1;
  string description = 2;
  bool is_invitable = 3;
  bool is_joinable = 4;
  string lead_id = 5; // опционально
}

message GetTeamRequest {
  string team_id = 1;
}

message UpdateTeamRequest {
  string team_id = 1;

  optional string name = 2;
  optional string description = 3;
  optional bool is_invitable = 4;
  optional bool is_joinable = 5;
  optional string lead_id = 6; // "" => очистить
}

message DeleteTeamRequest {
  string team_id = 1;
}

message ListTeamsRequest {
  string query = 1;        // поиск по названию
  bool only_my = 2;        // только команды, где я состою
  int32 page_size = 3;     // 10..100
  string page_token = 4;   // cursor
}

message ListTeamsResponse {
  repeated Team teams = 1;
  string next_page_token = 2;
}

message ListTeamMembersRequest {
  string team_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListTeamMembersResponse {
  repeated TeamMember members = 1;
  string next_page_token = 2;
}

message UpdateTeamMemberRequest {
  string team_id = 1;
  string user_id = 2;
  optional string duties = 3;
}

message RemoveTeamMemberRequest {
  string team_id = 1;
  string user_id = 2;
}


service Projects {
  // Создать проект и новую команду автоматически
  // Создатель автоматически становится project_member с полными правами
  rpc CreateProject(CreateProjectRequest) returns (Project);

  rpc GetProject(GetProjectRequest) returns (Project);

  // Частичный апдейт проекта
  rpc UpdateProject(UpdateProjectRequest) returns (Project);

  rpc DeleteProject(DeleteProjectRequest) returns (google.protobuf.Empty);

  // Список проектов для внутренних страниц: мои проекты, проекты команды
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);

  // Публичный листинг проектов для поиска (главный сценарий)
  // Обычно отдает только is_open=true
  rpc ListPublicProjects(ListPublicProjectsRequest) returns (ListPublicProjectsResponse);

  // Участники проекта
  rpc ListProjectMembers(ListProjectMembersRequest) returns (ListProjectMembersResponse);

  // Детальный список участников проекта для страницы управления участниками
  rpc ListProjectMemberDetails(ListProjectMemberDetailsRequest) returns (ListProjectMemberDetailsResponse);

  rpc ListManageableProjectJoinRequestBuckets(ListManageableProjectJoinRequestBucketsRequest)
      returns (ListManageableProjectJoinRequestBucketsResponse);
  // Прямое добавление участника в проект (для менеджеров проекта)
  rpc AddProjectMember(AddProjectMemberRequest) returns (ProjectMember);

  // Удаление участника из проекта
  //
  // Если remove_from_team=false:
  // - удаляем только участника из текущего проекта
  //
  // Если remove_from_team=true:
  // - удаляем пользователя из команды проекта
  // - удаляем пользователя из всех проектов этой команды
  //
  // Это team-level операция и должна быть доступна только тому,
  // кто имеет право управлять участниками команды
  rpc RemoveProjectMember(RemoveProjectMemberRequest) returns (google.protobuf.Empty);

  // Выдача/обновление прав участника проекта (только manager_rights)
  rpc UpdateProjectMemberRights(UpdateProjectMemberRightsRequest) returns (ProjectMember);

  // Пользователь подает заявку на вступление в проект
  rpc RequestJoinProject(RequestJoinProjectRequest) returns (ProjectJoinRequest);

  // Пользователь отменяет свою pending заявку
  rpc CancelJoinProject(CancelJoinProjectRequest) returns (ProjectJoinRequest);

  // Менеджеры проекта смотрят заявки
  rpc ListProjectJoinRequests(ListProjectJoinRequestsRequest) returns (ListProjectJoinRequestsResponse);

  rpc ListProjectJoinRequestDetails(ListProjectJoinRequestDetailsRequest)
      returns (ListProjectJoinRequestDetailsResponse);

  // Менеджер проекта одобряет заявку: создаем project_member и помечаем request approved
  rpc ApproveProjectJoinRequest(ApproveProjectJoinRequestRequest) returns (ProjectJoinRequest);

  // Менеджер проекта отклоняет заявку
  rpc RejectProjectJoinRequest(RejectProjectJoinRequestRequest) returns (ProjectJoinRequest);

  // SetOpen - меняет значение поля is_open у проекта
  rpc SetProjectOpen(SetProjectOpenRequest) returns (Project);

  rpc GetMyProjectJoinRequest(GetMyProjectJoinRequestRequest)
      returns (GetMyProjectJoinRequestResponse);

  rpc ListMyProjectJoinRequests(ListMyProjectJoinRequestsRequest)
      returns (ListMyProjectJoinRequestsResponse);

  // для приглашений кандидатов
  // Менеджер проекта приглашает пользователя в конкретный проект
  rpc InviteUserToProject(InviteUserToProjectRequest) returns (ProjectInvitation);

  // Менеджеры проекта смотрят приглашения по проекту
  rpc ListProjectInvitations(ListProjectInvitationsRequest) returns (ListProjectInvitationsResponse);

  rpc ListProjectInvitationDetails(ListProjectInvitationDetailsRequest)
      returns (ListProjectInvitationDetailsResponse);

  // Менеджер проекта отзывает pending приглашение
  rpc RevokeProjectInvitation(RevokeProjectInvitationRequest) returns (ProjectInvitation);

  // Кандидат смотрит свое приглашение в конкретный проект
  rpc GetMyProjectInvitation(GetMyProjectInvitationRequest)
      returns (GetMyProjectInvitationResponse);

  // Кандидат смотрит детали приглашения в проект
  rpc GetMyProjectInvitationDetails(GetMyProjectInvitationDetailsRequest)
      returns (GetMyProjectInvitationDetailsResponse);

  // Кандидат смотрит все свои приглашения
  rpc ListMyProjectInvitations(ListMyProjectInvitationsRequest)
      returns (ListMyProjectInvitationsResponse);

  // Кандидат принимает приглашение:
  // создаем project_member и помечаем invitation accepted
  rpc AcceptProjectInvitation(AcceptProjectInvitationRequest) returns (ProjectInvitation);

  // Кандидат отклоняет приглашение
  rpc RejectProjectInvitation(RejectProjectInvitationRequest) returns (ProjectInvitation);

  // Список проектов, в которые текущий пользователь может приглашать кандидатов
  rpc ListMyInvitableProjects(ListMyInvitableProjectsRequest)
      returns (ListMyInvitableProjectsResponse);

  // Полностью заменить требования проекта по тестам
  // Если список пустой => очистить все требования
  // Доступ: только тот, кто может управлять проектом
  rpc SetProjectAssessmentRequirements(SetProjectAssessmentRequirementsRequest) returns (Project);

  // Проверка, может ли текущий пользователь подать заявку на вступление
  // Используется фронтом перед RequestJoinProject
  // чтобы показать модалку с недостающими тестами / уровнями
  rpc GetMyProjectJoinEligibility(GetMyProjectJoinEligibilityRequest)
      returns (GetMyProjectJoinEligibilityResponse);
}

message CreateProjectRequest {
  // раньше было: string team_id = 1;
  reserved 1;
  reserved "team_id";

  string name = 2;
  string description = 3;
  ProjectStatus status = 4;
  bool is_open = 5;


  Date started_at = 6;
  optional Date finished_at = 7;

  // новое имя команды. Если пусто сервер сгенерирует
  string team_name = 8;

  repeated string skill_ids = 9; // полный список skill_id для проекта, max 60
}

message GetProjectRequest {
  string project_id = 1;
}

message UpdateProjectRequest {
  string project_id = 1;

  optional string name = 2;
  optional string description = 3;
  optional ProjectStatus status = 4;
  optional bool is_open = 5;

  optional Date started_at = 6;

  // finished_at:
  // - если поле не присутствует => не трогаем
  // - если присутствует и year=0 => очищаем (NULL)
  // - если присутствует и year>0 => ставим дату
  optional Date finished_at = 7;

  // skills:
  // - если поле не присутствует => не трогаем
  // - если ids пустой => очищаем все skills проекта
  // - если ids заполнен => полностью заменяем набор skills проекта
  SkillIdsSelection skills = 8;
}

message ListManageableProjectJoinRequestBucketsRequest {
  JoinRequestStatus status = 1; // обычно pending
  string query = 2;             // поиск по названию проекта
  int32 page_size = 3;
  string page_token = 4;
}

message ManageableProjectJoinRequestBucket {
  string project_id = 1;
  string project_name = 2;
  ProjectStatus project_status = 3;
  bool is_open = 4;

  int32 pending_requests_count = 5;
  optional Date last_request_created_at = 6;

  ProjectRights my_rights = 7;
}

message ListManageableProjectJoinRequestBucketsResponse {
  repeated ManageableProjectJoinRequestBucket items = 1;
  string next_page_token = 2;
}

message DeleteProjectRequest {
  string project_id = 1;
}

message ListProjectsRequest {
  string team_id = 1;        // опционально
  string creator_id = 2;     // опционально
  ProjectStatus status = 3;  // опционально (UNSPECIFIED => игнор)
  bool only_open = 4;
  string query = 5;

  string user_id = 6;        // ID пользователя для фильтрации
  int32 page_size = 7;       // Количество элементов на странице
  string page_token = 8;     // Токен для пагинации

  repeated string skill_ids = 9; // фильтр по skills
  ProjectSkillMatchMode skill_match_mode = 10;
}

message ListProjectsResponse {
  repeated Project projects = 1;
  string next_page_token = 2;
}

message ListPublicProjectsRequest {
  string query = 1;
  ProjectStatus status = 2; // фильтр, UNSPECIFIED => игнор
  int32 page_size = 3;
  string page_token = 4;
  repeated string skill_ids = 5;
  ProjectSkillMatchMode skill_match_mode = 6;
  ProjectPublicSortBy sort_by = 7;
  SortOrder sort_order = 8;
}

message ListPublicProjectsResponse {
  repeated ProjectPublic projects = 1;
  string next_page_token = 2;
}

message ListProjectMembersRequest {
  string project_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListProjectMembersResponse {
  repeated ProjectMember members = 1;
  string next_page_token = 2;
}

message AddProjectMemberRequest {
  string project_id = 1;
  string user_id = 2;
  ProjectRights rights = 3; // можно пустые (все false)
}

message RemoveProjectMemberRequest {
  string project_id = 1;
  string user_id = 2;

  // Если true:
  // - удалить пользователя из команды проекта
  // - удалить пользователя из всех проектов этой команды
  // Если false:
  // - удалить только из текущего проекта
  bool remove_from_team = 3;
}

message UpdateProjectMemberRightsRequest {
  string project_id = 1;
  string user_id = 2;

  // Частичный патч прав
  optional bool manager_rights = 3;
  optional bool manager_member = 4;
  optional bool manager_projects = 5;
  optional bool manager_tasks = 6;
}


message RequestJoinProjectRequest {
  string project_id = 1;
  string message = 2;
}

message CancelJoinProjectRequest {
  string request_id = 1;
}

message ListProjectJoinRequestsRequest {
  string project_id = 1;
  JoinRequestStatus status = 2; // UNSPECIFIED => все
  int32 page_size = 3;
  string page_token = 4;
}

message ListProjectJoinRequestsResponse {
  repeated ProjectJoinRequest requests = 1;
  string next_page_token = 2;
}

message ApproveProjectJoinRequestRequest {
  string request_id = 1;

  // Права, которые выдаем новому участнику при approve
  // Если не задано — все false
  ProjectRights initial_rights = 2;
}

message RejectProjectJoinRequestRequest {
  string request_id = 1;
  string reason = 2; // опционально
}

message SetProjectOpenRequest {
  string project_id = 1; // ID проекта, для которого меняем статус
  bool is_open = 2;      // Новый статус проекта (true/false)
}

message ProjectSkill {
  string id = 1;
  string name = 2;
}

enum ProjectAssessmentMode {
  PROJECT_ASSESSMENT_MODE_UNSPECIFIED = 0;
  PROJECT_ASSESSMENT_MODE_SUBTOPIC = 1;
  PROJECT_ASSESSMENT_MODE_GLOBAL = 2;
}

// Read-модель требования проекта
message ProjectAssessmentRequirement {
  int64 assessment_id = 1;
  string assessment_code = 2;
  string assessment_title = 3;

  int64 subject_id = 4;
  string subject_code = 5;
  string subject_title = 6;

  ProjectAssessmentMode mode = 7;

  // Минимальный уровень, который нужен проекту: 1..5
  int32 min_level = 8;
}

message ProjectAssessmentRequirementInput {
  int64 assessment_id = 1;
  int32 min_level = 2; // 1..5
}

// Детализация одной проверки требования проекта для текущего пользователя
// Нужна для модалки - чего не хватает для вступления
message ProjectAssessmentRequirementCheck {
  ProjectAssessmentRequirement requirement = 1;

  // Есть ли вообще сохраненный результат по этому тесту в профиле пользователя
  bool has_saved_result = 2;

  // Текущий сохраненный уровень пользователя по этому тесту
  // 0 => результата нет
  int32 current_level = 3;

  // Выполняет ли пользователь требование:
  // has_saved_result == true && current_level >= requirement.min_level
  bool meets_requirement = 4;

  // Удобные флаги для фронта:
  // нет результата => показать кнопку/ссылку пройти тест
  bool needs_pass_test = 5;

  // результат есть, но уровень ниже нужного => показать кнопку/ссылку улучшить результат
  bool needs_improve_level = 6;
}

// Ответ для precheck перед RequestJoinProject
// Фронт по нему поймет:
// - можно ли отправлять заявку
// - каких тестов не хватает
// - где уровень ниже требуемого
message GetMyProjectJoinEligibilityResponse {
  string project_id = 1;

  // true => можно вызывать RequestJoinProject
  // false => нужно сначала закрыть недостающие требования
  bool can_request_join = 2;

  int32 total_requirements_count = 3;
  int32 matched_requirements_count = 4;

  repeated ProjectAssessmentRequirementCheck checks = 5;
}

// Полная замена требований проекта
// Если requirements пустой => очистить все требования проекта
message SetProjectAssessmentRequirementsRequest {
  string project_id = 1;

  // Полный новый набор требований проекта
  // Backend-валидация:
  // - максимум 10
  // - без дублей по assessment_id
  // - min_level только 1..5
  repeated ProjectAssessmentRequirementInput requirements = 2;
}

message GetMyProjectJoinEligibilityRequest {
  string project_id = 1;
}

message ListProjectJoinRequestDetailsRequest {
  string project_id = 1;
  JoinRequestStatus status = 2; // pending / approved / rejected / all
  int32 page_size = 3;
  string page_token = 4;
}

message CandidatePublicSummary {
  string user_id = 1;
  string first_name = 2;
  string last_name = 3;
  string about = 4;
  repeated ProjectSkill skills = 5;
}

message SkillMatchSummary {
  int32 match_percent = 1;
  int32 matched_skills_count = 2;
  int32 total_project_skills_count = 3;
  repeated ProjectSkill matched_skills = 4;
  repeated ProjectSkill missing_project_skills = 5;
}

message ProjectJoinRequestDetails {
  string id = 1;
  string project_id = 2;
  string requester_id = 3;

  string message = 4;
  JoinRequestStatus status = 5;

  optional string decided_by = 6;
  optional Date decided_at = 7;
  Date created_at = 8;

  CandidatePublicSummary candidate = 9;
  SkillMatchSummary skill_match = 10;

  optional string rejection_reason = 11;
}

message ListProjectJoinRequestDetailsResponse {
  repeated ProjectJoinRequestDetails requests = 1;
  string next_page_token = 2;
}

message GetMyProjectJoinRequestRequest {
  string project_id = 1;
}

message GetMyProjectJoinRequestResponse {
  optional ProjectJoinRequest request = 1;
}

message ListMyProjectJoinRequestsRequest {
  JoinRequestStatus status = 1; // optional filter
  int32 page_size = 2;
  string page_token = 3;
}

message MyProjectJoinRequestItem {
  string project_id = 1;
  string project_name = 2;
  ProjectStatus project_status = 3;
  bool project_is_open = 4;

  ProjectJoinRequest request = 5;
}

message ListMyProjectJoinRequestsResponse {
  repeated MyProjectJoinRequestItem items = 1;
  string next_page_token = 2;
}

message InviteUserToProjectRequest {
  string project_id = 1;
  string user_id = 2;      // кого приглашаем
  string message = 3;      // optional
}

message ListProjectInvitationsRequest {
  string project_id = 1;
  ProjectInvitationStatus status = 2; // UNSPECIFIED => все
  int32 page_size = 3;
  string page_token = 4;
}

message ListProjectInvitationsResponse {
  repeated ProjectInvitation invitations = 1;
  string next_page_token = 2;
}

message ListProjectInvitationDetailsRequest {
  string project_id = 1;
  ProjectInvitationStatus status = 2; // pending / accepted / rejected / revoked / all
  int32 page_size = 3;
  string page_token = 4;
}

message ProjectInvitationDetails {
  string id = 1;
  string project_id = 2;
  string invited_user_id = 3;
  string invited_by = 4;

  string message = 5;
  ProjectInvitationStatus status = 6;

  optional string decided_by = 7;
  optional Date decided_at = 8;
  Date created_at = 9;

  CandidatePublicSummary candidate = 10;
  SkillMatchSummary skill_match = 11;

  optional string decision_reason = 12;
}

message ListProjectInvitationDetailsResponse {
  repeated ProjectInvitationDetails invitations = 1;
  string next_page_token = 2;
}

