syntax = "proto3";

package auth;
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "dgeko.sso.v1;ssov1";

service Auth {

  rpc Register(RegisterRequest) returns (RegisterResponse);

  rpc Login (LoginRequest) returns (LoginResponse);

  // Обновление access по refresh (ротация refresh внутри).
  rpc Refresh(RefreshRequest) returns (RefreshResponse);

  // Выход из одной сессии (по session_id) — полезно для «Logout current device».
  rpc Logout(LogoutRequest) returns (google.protobuf.Empty);

  // Смена пароля залогинен
  rpc ChangePassword(ChangePasswordRequest) returns (google.protobuf.Empty);

  // Забыл пароль — запрос на сброс (присылаем токен на e-mail).
  rpc ForgotPassword(ForgotPasswordRequest) returns (google.protobuf.Empty);

  // Сброс пароля по токену из письма.
  rpc ResetPassword(ResetPasswordRequest) returns (google.protobuf.Empty);

  rpc ResendVerification(ResendVerificationRequest) returns (google.protobuf.Empty);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string firstName = 3;
  string lastName = 4;
  string phone = 5;
}

message RegisterResponse {
  string status = 1;
  TokenPair tokens = 2;
}

message TokenPair {
  string access_token = 1;
  int64  access_expires_at = 2;
  string refresh_token = 3;
  int64  refresh_expires_at = 4;
  string session_id = 5;
  int32  token_version = 6;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string status = 1;
  TokenPair tokens = 2;
}

message RefreshRequest {
  // Gateway может доставать refresh из HttpOnly cookie и прокидывать его сюда (или оставить пустым).
  // Если пусто, сервис может прочитать refresh из метаданных/куки на gateway-слое
  string refresh_token = 1;
  string session_id    = 2; // опционально: если хотите адресно обновлять конкретную сессию
}

message RefreshResponse {
  string access_token      = 1;
  int64  access_expires_at = 2; // unix seconds
  string refresh_token     = 3; // можно возвращать; gateway уберёт в cookie
  int64  refresh_expires_at = 4;
  string session_id        = 5;
  int32  token_version     = 6;
}

message LogoutRequest {
  string session_id = 1;
}

message ResendVerificationRequest {
  string email = 1;
}

message ChangePasswordRequest {
  string current_password = 1;
  string new_password     = 2;
}

message ForgotPasswordRequest {
  string email = 1;
}

message ResetPasswordRequest {
  string email        = 1;
  string reset_token  = 2;
  string new_password = 3;
}

service UserProfile {
  // Профиль текущего пользователя (авторизация обязательна).
  rpc GetMe(google.protobuf.Empty) returns (User);

  // Обновление профиля текущего пользователя — частичный апдейт.
  rpc UpdateMe(UpdateMeRequest) returns (User);

  // Публичный профиль по user_id , скрытые поля не возвращаем
  rpc GetProfile(GetProfileRequest) returns (PublicUser);

  // Поиск/листинг пользователей
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);

  // Публичные профили по user_id ,
  rpc GetProfilesByIds(GetProfilesByIdsRequest) returns (GetProfilesByIdsResponse);

  // Публичный поиск кандидатов для страницы подбора участников
  rpc ListPublicCandidates(ListPublicCandidatesRequest) returns (ListPublicCandidatesResponse);
}

message User {
  string id = 1;
  string first_name = 2;
  string last_name  = 3;
  string email      = 4; // у себя можно показывать email
  string phone      = 5;
  string about      = 6;
  map<string, string> competence_levels = 7;
  string reviews = 8;
  bool is_user_open_suggestions = 9;
  bool is_profile_hidden = 10;
  bool is_banned = 11;
  google.protobuf.Timestamp registered_at = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;

  repeated Skill skills = 15;
}

// Публичная проекция.
message PublicUser {
  string id = 1;
  string first_name = 2;
  string last_name  = 3;
  string about      = 4;
  map<string, string> competence_levels = 5;
  string reviews = 6;
  bool is_user_open_suggestions = 7;

  repeated Skill skills = 8;
}

message GetProfileRequest {
  string user_id = 1;
}


message UpdateMeRequest {
  optional string first_name = 1;
  optional string last_name  = 2;
  optional string phone      = 3;
  optional string about      = 4;
  // Если поле присутствует — заменяем всю карту. Нужен частичный апдейт — выносите отдельную операцию.
  map<string, string> competence_levels = 5;
  optional bool is_user_open_suggestions = 6;
  optional bool is_profile_hidden = 7;

  SkillSelection skills = 8;
}

message ListUsersRequest {
  string query = 1;       // опционально: поиск по имени/скиллам
  int32  page_size = 2;   // 10..100
  string page_token = 3;  // для курсора

  // Фильтр по навыкам: список skill_id из каталога skills.
  repeated string skill_ids = 4;

  // Только пользователи, которые открыты к предложениям.
  bool open_suggestions_only = 5;
}

message ListUsersResponse {
  repeated PublicUser users = 1;
  string next_page_token = 2;
}

enum UserSkillMatchMode {
  USER_SKILL_MATCH_MODE_UNSPECIFIED = 0;
  USER_SKILL_MATCH_MODE_ANY = 1; // подходит, если есть хотя бы один выбранный skill
  USER_SKILL_MATCH_MODE_ALL = 2; // подходит, если есть все выбранные skill_ids
}

enum PublicUserSortBy {
  PUBLIC_USER_SORT_BY_UNSPECIFIED = 0;
  PUBLIC_USER_SORT_BY_CREATED_AT = 1;
  PUBLIC_USER_SORT_BY_PROFILE_SKILL_MATCH_PERCENT = 2;
  PUBLIC_USER_SORT_BY_MATCHED_SKILLS_COUNT = 3;
}

enum SortOrder {
  SORT_ORDER_UNSPECIFIED = 0;
  SORT_ORDER_ASC = 1;
  SORT_ORDER_DESC = 2;
}

message ListPublicCandidatesRequest {
  string query = 1;       // поиск по имени/about/skills
  int32 page_size = 2;    // 10..100
  string page_token = 3;  // cursor

  repeated string skill_ids = 4;
  UserSkillMatchMode skill_match_mode = 5;

  // фильтр по дате создания публичного профиля
  google.protobuf.Timestamp created_from = 6;
  google.protobuf.Timestamp created_to = 7;

  // только пользователи, открытые к предложениям
  bool open_suggestions_only = 8;

  // сортировка
  PublicUserSortBy sort_by = 9;
  SortOrder sort_order = 10;
}

message UserSkillMatchSummary {
  int32 match_percent = 1;             // 0..100
  int32 matched_skills_count = 2;      // сколько выбранных skill_ids найдено у пользователя
  int32 total_filter_skills_count = 3; // сколько skill_ids было передано в фильтр

  repeated Skill matched_skills = 4;         // какие из выбранных совпали
  repeated Skill missing_filter_skills = 5;  // каких из выбранных не хватает
}

message PublicCandidate {
  PublicUser user = 1;
  UserSkillMatchSummary skill_match = 2;
}

message ListPublicCandidatesResponse {
  repeated PublicCandidate candidates = 1;
  string next_page_token = 2;
}

service Skills {
  // Каталог навыков (публично).
  rpc ListSkills(ListSkillsRequest) returns (ListSkillsResponse);

  // Получить навык по id.
  rpc GetSkill(GetSkillRequest) returns (Skill);

  // Получить
  rpc GetSkillsByIds(GetSkillsByIdsRequest) returns (GetSkillsByIdsResponse);

  // Создать навык - админ.
  rpc CreateSkill(CreateSkillRequest) returns (Skill);

  // Удалить навык - админ.
  rpc DeleteSkill(DeleteSkillRequest) returns (google.protobuf.Empty);
}

message Skill {
  string id = 1;
  string name = 2;
}

message SkillSelection {
  repeated string ids = 1; // полный итоговый список skill_id, максимум 30
}

message GetSkillRequest {
  string skill_id = 1;
}

message CreateSkillRequest {
  string name = 1; // уникален
}

message DeleteSkillRequest {
  string skill_id = 1;
}

message ListSkillsRequest {
  // Поиск по названию навыка (ILIKE/startsWith).
  string query = 1;

  int32  page_size = 2;   // 10..100
  string page_token = 3;  // cursor/offset token
}

message ListSkillsResponse {
  repeated Skill skills = 1;
  string next_page_token = 2;
}

message GetSkillsByIdsRequest {
  repeated string skill_ids = 1;
}

message GetSkillsByIdsResponse {
  repeated Skill skills = 1;
}

message GetProfilesByIdsRequest {
  repeated string user_ids = 1;
}

message GetProfilesByIdsResponse {
  repeated PublicUser users = 1;
}